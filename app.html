<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marketing Wordle</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f8f9fa; padding: 20px; }
        #game-board { display: grid; grid-template-rows: repeat(6, 1fr); grid-gap: 5px; justify-content: center; margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); grid-gap: 5px; }
        .tile { width: 50px; height: 50px; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; text-transform: uppercase; background: white; }
        .correct { background-color: #6aaa64 !important; color: white; border-color: #6aaa64; } /* Green */
        .present { background-color: #c9b458 !important; color: white; border-color: #c9b458; } /* Yellow */
        .absent { background-color: #787c7e !important; color: white; border-color: #787c7e; }  /* Grey */
        input { padding: 10px; font-size: 16px; width: 150px; text-align: center; margin-top: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #add8e6; border: none; border-radius: 5px; }
        .nav-link { display: block; margin-top: 20px; color: #808080; text-decoration: none; }
    </style>
</head>
<body>

    <h1>Marketing Wordle</h1>
    <p>Guess the 5-letter marketing word!</p>

    <div id="game-board"></div>

    <input type="text" id="guess-input" maxlength="5" placeholder="Enter guess">
    <button onclick="makeGuess()">Submit</button>
    <p id="message"></p>

    <a href="index.html" class="nav-link">← Back to Portfolio</a>

    <script>
        const targetWord = "BRAND"; // Change this to any 5-letter word
        let currentAttempt = 0;
        const board = document.getElementById('game-board');

        // Create the grid
        for (let i = 0; i < 6; i++) {
            let row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < 5; j++) {
                let tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            board.appendChild(row);
        }

        function makeGuess() {
            const input = document.getElementById('guess-input');
            const guess = input.value.toUpperCase();
            const message = document.getElementById('message');

            if (guess.length !== 5) {
                message.innerText = "Must be 5 letters!";
                return;
            }

            if (currentAttempt >= 6) return;

            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${currentAttempt}-${i}`);
                tile.innerText = guess[i];

                if (guess[i] === targetWord[i]) {
                    tile.classList.add('correct');
                } else if (targetWord.includes(guess[i])) {
                    tile.classList.add('present');
                } else {
                    tile.classList.add('absent');
                }
            }

            if (guess === targetWord) {
                message.innerText = "You Win! 🥳";
                input.disabled = true;
            } else if (currentAttempt === 5) {
                message.innerText = "Game Over! The word was " + targetWord;
            }

            currentAttempt++;
            input.value = "";
        }
    </script>
</body>
</html>
